<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ClaudeFeed</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="topbar">
    <h1>ClaudeFeed</h1>
    <p class="meta" id="meta">読み込み中…</p>
  </header>

  <main id="timeline" class="timeline" aria-live="polite"></main>

  <footer class="footer">
    <button id="show-extras-btn" class="extras-btn hidden" type="button">残りを見る</button>
    <p class="hint">Claude Code 中心の毎日20件 · ノイズは隠す</p>
  </footer>

  <div id="extras-dialog" class="dialog hidden" role="dialog" aria-modal="true" aria-labelledby="dialog-msg">
    <div class="dialog-card">
      <p id="dialog-msg" class="dialog-msg"></p>
      <div class="dialog-actions">
        <button id="skip-extras" class="btn btn-secondary" type="button">今日はやめとく</button>
        <button id="show-extras" class="btn btn-primary" type="button">見てみる</button>
      </div>
    </div>
  </div>

  <script src="./app.js" type="module"></script>
</body>
</html>
